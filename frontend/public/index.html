<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="description" content="EV ChargeSmart — ML-powered EV charging station wait-time prediction using Random Forest, LSTM, and M/M/c Queue Model." />
  <title>⚡ EV ChargeSmart</title>

  <!-- Leaflet CSS (OpenStreetMap tiles) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLI=" crossorigin=""></script>

  <style>
    body { margin: 0; background: #0a0e1a; }
    #root { min-height: 100vh; }
    /* Override Leaflet popup for dark theme */
    .leaflet-popup-content-wrapper {
      background: #161f30;
      color: #e2e8f0;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    .leaflet-popup-tip { background: #161f30; }
    .leaflet-popup-content { margin: 12px 16px; font-family: 'Inter', sans-serif; font-size: 12px; }
    .leaflet-container { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run EV ChargeSmart.</noscript>
  <div id="root"></div>
</body>
</html>
