# streamlit_app/.streamlit/config.toml
# Streamlit server & theme configuration

[server]
port = 8501
address = "0.0.0.0"
headless = true
runOnSave = false
maxUploadSize = 50

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
base = "dark"
primaryColor        = "#39d353"
backgroundColor     = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor           = "#c9d1d9"
font                = "sans serif"

[logger]
level = "warning"
