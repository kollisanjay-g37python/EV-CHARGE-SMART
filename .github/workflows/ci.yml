# .github/workflows/ci.yml
# CI pipeline: lint → test → build Docker image

name: EV ChargeSmart CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

jobs:

  # ── Python: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 src/ backend/ alerts/ config/ --max-line-length=120 --ignore=E501,W503,F401

      - name: Check black formatting
        run: black src/ backend/ alerts/ config/ streamlit_app/ --check --line-length=100

      - name: Check isort
        run: isort src/ backend/ alerts/ config/ --check-only

  # ── Python: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r deployment/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run data pipeline tests
        run: pytest tests/test_data_pipeline.py -v --tb=short

      - name: Run model tests
        run: pytest tests/test_models.py -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Run recommendation tests
        run: pytest tests/test_recommendation.py -v --tb=short

      - name: Generate coverage report
        run: |
          pytest tests/ --cov=src --cov=backend --cov=alerts \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true

  # ── Frontend: Build ───────────────────────────────────────────────────────────
  frontend:
    name: React Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000/api/v1
          CI: false

  # ── Docker: Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/dockerfile
          push: false
          tags: ev-chargesmart:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Integration: API smoke test ───────────────────────────────────────────────
  integration:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r deployment/requirements.txt
          pip install httpx

      - name: Start API server
        run: |
          uvicorn backend.app:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: curl -f http://localhost:8000/health

      - name: Stations endpoint
        run: curl -f "http://localhost:8000/api/v1/stations?limit=5"

      - name: Predict endpoint
        run: |
          curl -f -X POST http://localhost:8000/api/v1/predict \
            -H "Content-Type: application/json" \
            -d '{"station_id":1,"num_ports":8,"available_ports":3,"queue_size":4,"hour":18,"day_of_week":2,"traffic_score":0.7}'
