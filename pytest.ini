[pytest]
# pytest.ini — EV Charging Smart System test configuration

testpaths   = tests
python_files= test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity & output
addopts =
    --tb=short
    --strict-markers
    -q

# Timeout per test (seconds) — requires pytest-timeout
# timeout = 60

# Custom markers
markers =
    slow:       mark test as slow (deselect with -m "not slow")
    api:        mark test as requiring a running API server
    ml:         mark test as training/evaluating an ML model
    integration:mark test as an integration test

# Log level during tests
log_cli       = true
log_cli_level = WARNING
log_format    = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning:sklearn
